name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Base tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build theme assets
        run: npm run build

      - name: Verify generated assets are committed
        run: git diff --exit-code -- assets/css/style.css assets/js/script.js

      - name: Package theme ZIP
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npm run zip

      - name: Upload theme ZIP artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: atilla-rw-custom-${{ github.sha }}
          path: dist/atilla-rw-custom.zip
          if-no-files-found: error
          retention-days: 90
